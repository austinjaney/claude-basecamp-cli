<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">

  <!-- Background -->
  <rect width="512" height="512" fill="#2A373D"></rect>

  <!-- BODY -->
  <rect x="96" y="96" width="320" height="32" fill="#E8714F"></rect>
  <rect x="96" y="128" width="320" height="32" fill="#E8714F"></rect>

  <!-- EARS ROWS -->
  <rect x="64" y="160" width="384" height="32" fill="#E8714F"></rect>
  <rect x="64" y="192" width="384" height="32" fill="#E8714F"></rect>

  <!-- LOWER BODY -->
  <rect x="96" y="224" width="320" height="32" fill="#E8714F"></rect>
  <rect x="96" y="256" width="320" height="32" fill="#E8714F"></rect>
  <rect x="96" y="288" width="320" height="32" fill="#E8714F"></rect>

  <!-- EYES (aligned with ear bumps: y=160–224, height=64) -->
  <rect x="160" y="160" width="32" height="64" fill="#111"></rect>
  <rect x="320" y="160" width="32" height="64" fill="#111"></rect>

  <!-- LEGS -->
  <rect x="128" y="352" width="32" height="64" fill="#E8714F"></rect>
  <rect x="192" y="352" width="32" height="64" fill="#E8714F"></rect>
  <rect x="288" y="352" width="32" height="64" fill="#E8714F"></rect>
  <rect x="352" y="352" width="32" height="64" fill="#E8714F"></rect>

</svg>
